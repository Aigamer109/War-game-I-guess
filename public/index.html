<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grand Strategy War Game</title>
<style>
  body { margin: 0; font-family: sans-serif; background: #87CEEB; }
  #lobby, #game { display: none; }
  #lobby { padding: 20px; }
  #players { margin-top: 10px; }
  #currentTurn { background: #ccc; padding: 10px; text-align: center; font-weight: bold; }
  canvas { display: block; margin: auto; background: #87CEEB; }
  .unitMenu { position: absolute; background: #fff; border: 1px solid #000; padding: 5px; display: none; }
  .tab { cursor: pointer; padding: 3px 6px; display: inline-block; border: 1px solid #000; margin-right: 2px; }
  .tab.active { background: #ddd; }
  .unitItem { margin: 2px 0; cursor: pointer; }
</style>
</head>
<body>

<div id="menu">
  <h2>Grand Strategy War Game</h2>
  <input type="text" id="playerName" placeholder="Enter your name"/>
  <button id="hostBtn">Host Lobby</button>
  <input type="text" id="lobbyCodeInput" placeholder="Lobby Code"/>
  <button id="joinBtn">Join Lobby</button>
</div>

<div id="lobby">
  <h3>Lobby Code: <span id="lobbyCodeDisplay"></span></h3>
  <div id="players"></div>
  <button id="startBtn" disabled>Start Game</button>
</div>

<div id="game">
  <div id="currentTurn">Current Turn: </div>
  <canvas id="mapCanvas" width="1000" height="600"></canvas>
  <div id="unitMenu" class="unitMenu">
    <div id="tabs">
      <div class="tab active" data-type="Ground">Ground</div>
      <div class="tab" data-type="Air">Air</div>
      <div class="tab" data-type="Sea">Sea</div>
    </div>
    <div id="unitList"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let lobbyCode, playerName;
let gameState = null;
let selectedCountry = null;
let unitMenu = document.getElementById('unitMenu');
let currentTab = "Ground";

document.getElementById('hostBtn').onclick = () => {
  playerName = document.getElementById('playerName').value || "Player";
  socket.emit('hostLobby', { name: playerName });
};

document.getElementById('joinBtn').onclick = () => {
  playerName = document.getElementById('playerName').value || "Player";
  lobbyCode = document.getElementById('lobbyCodeInput').value.toUpperCase();
  socket.emit('joinLobby', { code: lobbyCode, name: playerName });
};

document.getElementById('startBtn').onclick = () => {
  socket.emit('startGame', lobbyCode);
};

socket.on('lobbyCreated', data => {
  lobbyCode = data.code;
  document.getElementById('menu').style.display = 'none';
  document.getElementById('lobby').style.display = 'block';
  document.getElementById('lobbyCodeDisplay').innerText = lobbyCode;
  updatePlayerList(data.players);
});

socket.on('lobbyUpdate', data => {
  updatePlayerList(data.players);
  document.getElementById('startBtn').disabled = data.players.length < 2;
});

socket.on('gameStarted', state => {
  gameState = state;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  drawMap();
  updateTurnIndicator();
});

socket.on('updateGame', state => {
  gameState = state;
  drawMap();
  updateTurnIndicator();
});

function updatePlayerList(players) {
  const div = document.getElementById('players');
  div.innerHTML = '';
  players.forEach(p => {
    div.innerHTML += `<div>${p.name} ${p.isHost ? '(Host)' : ''} ${p.isBot ? '[Bot]' : ''}</div>`;
  });
}

function updateTurnIndicator() {
  if (!gameState) return;
  document.getElementById('currentTurn').innerText = "Current Turn: " + gameState.players[gameState.currentTurn].name;
}

const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');

canvas.addEventListener('click', e => {
  if (!gameState) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  selectedCountry = null;
  for (let c of gameState.countries) {
    if (pointInPolygon(mx, my, c.points)) {
      selectedCountry = c;
      break;
    }
  }
  if (selectedCountry) {
    showUnitMenu(selectedCountry, e.clientX, e.clientY);
  } else {
    unitMenu.style.display = 'none';
  }
});

function showUnitMenu(country, x, y) {
  unitMenu.style.left = x + 'px';
  unitMenu.style.top = y + 'px';
  unitMenu.style.display = 'block';
  renderUnitList(country);
}

function renderUnitList(country) {
  const list = document.getElementById('unitList');
  list.innerHTML = '';
  const units = country.units[currentTab] || [];
  units.forEach(u => {
    const div = document.createElement('div');
    div.classList.add('unitItem');
    div.innerText = u.name + " x" + u.count;
    div.onclick = () => { selectUnit(u, country); };
    list.appendChild(div);
  });
}

function selectUnit(unit, country) {
  console.log("Selected unit", unit, "from", country.name);
  // Implement unit attack/transfer logic
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.type;
    if (selectedCountry) renderUnitList(selectedCountry);
  }
});

// --- Map drawing ---
function drawMap() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if (!gameState) return;
  for (let c of gameState.countries) {
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.moveTo(c.points[0].x, c.points[0].y);
    for (let p of c.points) ctx.lineTo(p.x, p.y);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.stroke();
    ctx.fillStyle = '#000';
    ctx.fillText(c.name + "\n(" + c.ownerName + ")", c.points[0].x + 5, c.points[0].y + 15);
  }
}

// --- Helper ---
function pointInPolygon(x, y, poly) {
  let inside = false;
  for (let i = 0, j = poly.length-1; i<poly.length; j=i++) {
    if (((poly[i].y>y) != (poly[j].y>y)) && 
        (x < (poly[j].x - poly[i].x) * (y - poly[i].y) / (poly[j].y - poly[i].y) + poly[i].x))
      inside = !inside;
  }
  return inside;
}
</script>
</body>
</html>
