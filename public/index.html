<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grand Strategy War Game</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
body { margin: 0; background: #87ceeb; font-family: sans-serif; }
#lobby, #game { display:none; padding:20px; }
#map { position: relative; width: 1000px; height: 600px; margin: auto; background: #4da6ff; }
.country { position: absolute; cursor: pointer; border: 1px solid #333; }
.statsMenu, .unitMenu { position: absolute; background: rgba(200,200,200,0.9); padding: 5px; border-radius:5px; display:none; z-index: 10; }
#turnDisplay { position:absolute; top:10px; left:50%; transform:translateX(-50%); background:#ccc; padding:10px; border-radius:5px; z-index:20; }
.unit { position:absolute; width:15px; height:15px; border-radius:50%; }
.airUnit { background:red; }
.groundUnit { background:green; }
.seaUnit { background:blue; }
</style>
</head>
<body>

<div id="menu">
    <h1>Grand Strategy War Game</h1>
    <input id="playerNameInput" placeholder="Enter Player Name" />
    <button id="createBtn">Create Lobby</button>
    <input id="joinCodeInput" placeholder="Enter Lobby Code" />
    <button id="joinBtn">Join Lobby</button>
</div>

<div id="lobby">
    <h2>Lobby <span id="lobbyCode"></span></h2>
    <ul id="playersList"></ul>
    <button id="startBtn">Start Game</button>
</div>

<div id="game">
    <div id="turnDisplay">Current Turn: </div>
    <div id="map"></div>
    <div id="statsMenu" class="statsMenu"></div>
    <div id="unitMenu" class="unitMenu"></div>
</div>

<script>
const socket = io();
let playerId = null;
let lobbyCode = null;
let isHost = false;
let currentPlayerIndex = 0;
let countries = [];
let players = [];
let units = [];
let gameData = {};

// Lobby Buttons
document.getElementById('createBtn').onclick = () => {
    const name = document.getElementById('playerNameInput').value || 'Player';
    socket.emit('createLobby', name);
};

document.getElementById('joinBtn').onclick = () => {
    const code = document.getElementById('joinCodeInput').value.toUpperCase();
    const name = document.getElementById('playerNameInput').value || 'Player';
    socket.emit('joinLobby', code, name);
};

socket.on('lobbyCreated', (code) => {
    lobbyCode = code;
    isHost = true;
    document.getElementById('menu').style.display='none';
    document.getElementById('lobby').style.display='block';
    document.getElementById('lobbyCode').innerText = code;
});

socket.on('updateLobby', (lobby) => {
    players = [...lobby.players, ...lobby.bots];
    document.getElementById('playersList').innerHTML = '';
    players.forEach(p => {
        const li = document.createElement('li');
        li.innerText = p.name + (lobby.host===p.id?' (Host)':'');
        document.getElementById('playersList').appendChild(li);
    });
});

document.getElementById('startBtn').onclick = () => {
    socket.emit('startGame');
};

socket.on('gameStarted', (lobby) => {
    gameData = lobby;
    document.getElementById('lobby').style.display='none';
    document.getElementById('game').style.display='block';
    initializeMap();
    updateTurnDisplay();
});

function initializeMap(){
    const map = document.getElementById('map');
    map.innerHTML = '';
    countries = [];
    const countryNames = ["USA","Russia","China","UK","France","Germany","Brazil","India","Australia","Canada","Japan","Italy","Mexico","SouthAfrica","Egypt","Argentina","SaudiArabia","Spain","Turkey","Indonesia","Pakistan","Norway","Sweden","Finland","Poland","Ukraine","Thailand","Vietnam","SouthKorea","NorthKorea","Chile","Colombia","Peru","Venezuela","Nigeria","Kenya","Morocco","Algeria","Greece","Portugal","Netherlands","Belgium","Iraq","Iran","Syria","Philippines","Malaysia","Singapore","NewZealand","Cuba","CzechRepublic"];

    for(let i=0;i<50;i++){
        const c = document.createElement('div');
        c.classList.add('country');
        c.style.width = Math.floor(Math.random()*50+50)+'px';
        c.style.height = Math.floor(Math.random()*50+50)+'px';
        c.style.background = '#'+Math.floor(Math.random()*16777215).toString(16);
        c.style.top = Math.floor(Math.random()*500)+'px';
        c.style.left = Math.floor(Math.random()*900)+'px';
        c.innerText = countryNames[i];
        c.dataset.name = countryNames[i];
        c.dataset.owner = 'neutral';
        c.dataset.air = Math.floor(Math.random()*100);
        c.dataset.ground = Math.floor(Math.random()*100);
        c.dataset.naval = Math.floor(Math.random()*100);
        c.dataset.resources = Math.floor(Math.random()*50+50);
        c.dataset.isCoastal = Math.random()>0.3;

        c.onclick = (e)=>{ showStatsMenu(c, e.pageX, e.pageY); };

        map.appendChild(c);
        countries.push(c);
    }
}

function showStatsMenu(country, x, y){
    const menu = document.getElementById('statsMenu');
    menu.style.display='block';
    menu.style.left = x+'px';
    menu.style.top = y+'px';
    menu.innerHTML = `<b>${country.dataset.name}</b><br>Owner: ${country.dataset.owner}<br>Air: ${country.dataset.air}<br>Ground: ${country.dataset.ground}<br>Naval: ${country.dataset.naval}<br>Resources: ${country.dataset.resources}`;
}

document.body.onclick = (e)=>{ if(!e.target.classList.contains('country')) document.getElementById('statsMenu').style.display='none'; };

function updateTurnDisplay(){
    const display = document.getElementById('turnDisplay');
    if(players.length>0){
        display.innerText = `Current Turn: ${players[currentPlayerIndex].name}`;
    }
}
</script>
</body>
</html>
