<!DOCTYPE html>
<html>
<head>
  <title>World Strategy Game</title>
  <style>
    button { margin: 5px; padding: 10px; font-size: 16px; }
    #players { margin-top: 10px; }
  </style>
</head>
<body>
  <h1>World Strategy Lobby</h1>

  <button onclick="createRoom()">Create Room</button>
  <br><br>

  <input id="roomInput" placeholder="Enter Room Code" />
  <button onclick="joinRoom()">Join Room</button>

  <h2 id="status"></h2>
  <h3 id="players"></h3>

  <button id="startBtn" onclick="startGame()" style="display:none;">Start Game</button>
  <br><br>

  <button id="endTurnBtn" onclick="endTurn()" disabled>End Turn</button>
  <h3 id="turnInfo"></h3>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let currentRoom = null;
    let myId = null;
    let myIndex = null;
    let isHost = false;
    let countries = {};

    socket.on("myId", (id) => { myId = id; });

    function createRoom() { socket.emit("createRoom"); }

    function joinRoom() {
      const code = document.getElementById("roomInput").value.toUpperCase();
      socket.emit("joinRoom", code);
      currentRoom = code;
    }

    function startGame() { if (currentRoom) socket.emit("startGame", currentRoom); }
    function endTurn() { if (currentRoom) socket.emit("endTurn", currentRoom); }

    socket.on("roomCreated", (code) => {
      currentRoom = code;
      document.getElementById("status").innerText = "Room Code: " + code;
    });

    socket.on("updatePlayers", (room) => {
      myIndex = room.players.indexOf(myId);
      isHost = (myId === room.host);
      countries = room.countries || {};

      let list = room.players.map((p,i) => {
        const c = countries[p] ? countries[p].flag : "";
        let name = p.startsWith("BOT_") ? `[Bot ${i+1}]` : `Player ${i+1}`;
        if (p === room.host) name += " (Host)";
        if (p === myId && !p.startsWith("BOT_")) name += " (You)";
        return `${c} ${name}`;
      });

      document.getElementById("players").innerText = "Players: " + list.join(", ");
      document.getElementById("startBtn").style.display = (isHost && !room.started) ? "inline-block" : "none";
    });

    socket.on("gameStarted", (room) => {
      document.getElementById("status").innerText = "Game Started!";
      document.getElementById("startBtn").style.display = "none";
      document.getElementById("endTurnBtn").disabled = false;
      countries = room.countries;
    });

    socket.on("turnUpdate", (data) => {
      const { turnIndex, players, countries: roomCountries } = data;
      countries = roomCountries;

      myIndex = players.indexOf(myId);
      const currentPlayer = players[turnIndex].startsWith("BOT_")
        ? `[Bot ${turnIndex + 1}]`
        : `Player ${turnIndex + 1}`;
      const flag = roomCountries[players[turnIndex]] ? roomCountries[players[turnIndex]].flag : "";

      if (myIndex === turnIndex) {
        document.getElementById("turnInfo").innerText = `🟢 Your turn (${flag})!`;
        document.getElementById("endTurnBtn").disabled = false;
      } else {
        document.getElementById("turnInfo").innerText = `⏳ ${flag} ${currentPlayer}'s turn`;
        document.getElementById("endTurnBtn").disabled = true;
      }
    });

    socket.on("worldPeaceVote", () => { alert("🌍 World Peace Vote Triggered!"); });
    socket.on("errorMessage", (msg) => { alert(msg); });
  </script>
</body>
</html>
