<!DOCTYPE html>
<html>
<head>
  <title>World Strategy Game</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 50px; }
    button { padding: 10px 20px; margin: 5px; }
    input { padding: 5px; width: 100px; text-align: center; }
  </style>
</head>
<body>
  <h1>World Strategy Lobby</h1>

  <button onclick="createRoom()">Create Room</button>
  <br><br>

  <input id="roomInput" placeholder="Enter Room Code" />
  <button onclick="joinRoom()">Join Room</button>

  <h2 id="status"></h2>
  <h3 id="players"></h3>

  <button onclick="endTurn()">End Turn</button>

  <!-- SOCKET.IO -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const socket = io("https://war-game-qc95.onrender.com"); // <-- Your live Render URL

    let currentRoom = null;

    function createRoom() {
      socket.emit("createRoom");
    }

    function joinRoom() {
      const code = document.getElementById("roomInput").value.trim();
      if (!code) { alert("Enter a room code"); return; }
      socket.emit("joinRoom", code);
    }

    function endTurn() {
      if (!currentRoom) { alert("Not in a room"); return; }
      socket.emit("endTurn", currentRoom);
    }

    // SOCKET EVENTS
    socket.on("roomCreated", (code) => {
      currentRoom = code;
      document.getElementById("status").innerText = "Room Code: " + code;
      document.getElementById("players").innerText = "Players in Room: 1";
    });

    socket.on("updatePlayers", (players) => {
      document.getElementById("players").innerText =
        "Players in Room: " + players.length;
      if (!currentRoom) currentRoom = players[0]; // set room if joining
    });

    socket.on("turnUpdate", (turn) => {
      document.getElementById("status").innerText =
        "Current Turn: Player Index " + turn;
    });

    socket.on("worldPeaceVote", () => {
      alert("🌍 World Peace Vote Triggered!");
    });

    socket.on("errorMessage", (msg) => {
      alert("❌ " + msg);
    });

    socket.on("connect_error", (err) => {
      console.error("Socket connection error:", err);
      alert("Socket connection failed. Check your server URL.");
    });
  </script>
</body>
</html>
