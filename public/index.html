<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grand Strategy Game</title>
<style>
  body { margin: 0; font-family: sans-serif; background: #1e1e2f; color: #fff; }
  #lobby, #game { display: none; }
  #playerList { list-style: none; padding: 0; }
  #map { width: 100vw; height: 80vh; background: #3a6ea5; display: block; }
  .country { cursor: pointer; }
  .statsBox { position: absolute; background: rgba(200,200,200,0.9); color: #000; padding: 5px; border-radius: 5px; display: none; }
  #turnIndicator { background: #888; padding: 10px; text-align: center; margin-bottom: 5px; }
</style>
</head>
<body>

<div id="menu">
  <h1>Grand Strategy Game</h1>
  <input id="playerName" placeholder="Enter your name" />
  <button id="createBtn">Create Lobby</button>
  <input id="lobbyIDInput" placeholder="Lobby ID" />
  <button id="joinBtn">Join Lobby</button>
</div>

<div id="lobby">
  <h2>Lobby <span id="hostLabel"></span></h2>
  <ul id="playerList"></ul>
  <button id="startBtn">Start Game</button>
</div>

<div id="game">
  <div id="turnIndicator">Current Turn: </div>
  <canvas id="map"></canvas>
  <div class="statsBox" id="statsBox"></div>
  <button id="endTurnBtn">End Turn</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let lobbyID = null;
let playerID = null;
let players = [];
let countries = [];
let currentTurn = 0;
let resources = {};

const menuDiv = document.getElementById("menu");
const lobbyDiv = document.getElementById("lobby");
const gameDiv = document.getElementById("game");
const playerList = document.getElementById("playerList");
const hostLabel = document.getElementById("hostLabel");
const turnIndicator = document.getElementById("turnIndicator");
const statsBox = document.getElementById("statsBox");
const mapCanvas = document.getElementById("map");
const ctx = mapCanvas.getContext("2d");

document.getElementById("createBtn").onclick = () => {
  const name = document.getElementById("playerName").value || "Player";
  socket.emit("createLobby", { playerName: name });
};

document.getElementById("joinBtn").onclick = () => {
  const name = document.getElementById("playerName").value || "Player";
  const inputID = document.getElementById("lobbyIDInput").value;
  socket.emit("joinLobby", { lobbyID: inputID, playerName: name });
};

document.getElementById("startBtn").onclick = () => {
  socket.emit("startGame", { lobbyID });
};

document.getElementById("endTurnBtn").onclick = () => {
  socket.emit("endTurn", { lobbyID });
};

// Lobby updates
socket.on("lobbyCreated", (data) => {
  lobbyID = data.lobbyID;
  menuDiv.style.display = "none";
  lobbyDiv.style.display = "block";
});

socket.on("updatePlayers", (plrs) => {
  players = plrs;
  playerList.innerHTML = "";
  plrs.forEach((p) => {
    const li = document.createElement("li");
    li.textContent = p.name + (p.id === players[0].id ? " [Host]" : "");
    playerList.appendChild(li);
  });
  // host button visibility
  document.getElementById("startBtn").style.display = (players[0].id === socket.id && players.length >= 2) ? "block" : "none";
});

// Game started
socket.on("gameStarted", (data) => {
  lobbyDiv.style.display = "none";
  gameDiv.style.display = "block";
  players = data.players;
  countries = data.countries;
  resources = data.resources;
  currentTurn = data.currentTurn;
  drawMap();
  updateTurnIndicator();
});

// Turn updates
socket.on("updateTurn", (turn) => {
  currentTurn = turn;
  updateTurnIndicator();
});

function updateTurnIndicator() {
  const player = players[currentTurn];
  turnIndicator.textContent = `Current Turn: ${player.name} ${player.isBot ? "[Bot]" : ""}`;
}

// MAP
mapCanvas.width = window.innerWidth;
mapCanvas.height = window.innerHeight * 0.8;

function drawMap() {
  ctx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
  countries.forEach((c) => {
    const x = c.position.x * mapCanvas.width;
    const y = c.position.y * mapCanvas.height;
    c.screenX = x;
    c.screenY = y;
    ctx.fillStyle = c.owner ? c.owner.color : `hsl(${Math.random()*360},50%,50%)`;
    ctx.beginPath();
    ctx.arc(x, y, 20, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = "#000";
    ctx.fillText(c.name, x-15, y-25);
  });
}

mapCanvas.onclick = (e) => {
  const rect = mapCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  for (const c of countries) {
    const dx = mx - c.screenX;
    const dy = my - c.screenY;
    if (Math.sqrt(dx*dx + dy*dy) < 20) {
      showStats(c, mx, my);
      break;
    }
  }
};

function showStats(c, x, y) {
  statsBox.style.display = "block";
  statsBox.style.left = x + "px";
  statsBox.style.top = y + "px";
  statsBox.innerHTML = `
    <b>${c.name}</b><br>
    Owner: ${c.owner ? c.owner.name : "None"}<br>
    Air: ${c.stats.air}<br>
    Naval: ${c.stats.naval}<br>
    Ground: ${c.stats.ground}<br>
    Resources: ${c.stats.resources}
  `;
}
</script>
</body>
</html>
