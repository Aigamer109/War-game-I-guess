<!DOCTYPE html>
<html>
<head>
  <title>World Strategy Map</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; background: #f0f0f0; }
    #turnBox {
      background: #ccc; padding: 10px; text-align: center; font-weight: bold;
    }
    #map {
      display: grid;
      grid-template-columns: repeat(10, 60px);
      grid-template-rows: repeat(5, 60px);
      gap: 2px;
      padding: 10px;
    }
    .country {
      background: #eee;
      border: 1px solid #999;
      text-align: center;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .country.landlocked { background: #ddd; }
    #controls { padding: 10px; text-align: center; }
    button { padding: 5px 10px; font-size: 14px; margin-top: 5px; }
  </style>
</head>
<body>
  <div id="turnBox">Waiting to start...</div>
  <div id="map"></div>
  <div id="controls">
    <button id="endTurnBtn" onclick="endTurn()" disabled>End Turn</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let myId = null;
    let currentTurnIndex = 0;
    let players = [];
    let countriesData = [];
    let myIndex = null;

    // Country generation
    const TOTAL_COUNTRIES = 50;

    function randomStats(size, landlocked) {
      return {
        air: Math.floor(size * 5 + Math.random() * 10),
        naval: landlocked ? 0 : Math.floor(size * 5 + Math.random() * 10),
        ground: Math.floor(size * 10 + Math.random() * 20),
        resources: Math.floor(Math.random() * 100 + 50)
      };
    }

    function generateCountries() {
      countriesData = [];
      for (let i = 0; i < TOTAL_COUNTRIES; i++) {
        const size = Math.floor(Math.random() * 3 + 1); // 1=small, 2=medium, 3=large
        const landlocked = Math.random() < 0.3; // 30% chance landlocked
        countriesData.push({
          id: i,
          name: `C${i+1}`,
          size,
          landlocked,
          stats: randomStats(size, landlocked),
          owner: null
        });
      }
    }

    function renderMap() {
      const map = document.getElementById("map");
      map.innerHTML = "";
      countriesData.forEach(c => {
        const div = document.createElement("div");
        div.className = "country" + (c.landlocked ? " landlocked" : "");
        div.id = "country-" + c.id;
        div.innerHTML = `<b>${c.name}</b><br>
          🌍${c.owner || ""}<br>
          A:${c.stats.air} N:${c.stats.naval} G:${c.stats.ground} R:${c.stats.resources}`;
        div.onclick = () => countryClick(c.id);
        map.appendChild(div);
      });
    }

    function countryClick(id) {
      const c = countriesData[id];
      alert(`Country ${c.name}\nAir: ${c.stats.air}\nNaval: ${c.stats.naval}\nGround: ${c.stats.ground}\nResources: ${c.stats.resources}`);
    }

    function endTurn() {
      socket.emit("endTurn", "mapRoom"); // we will have a fixed room for now
    }

    socket.on("myId", id => { myId = id; });

    socket.on("turnUpdate", (data) => {
      players = data.players;
      currentTurnIndex = data.turnIndex;
      myIndex = players.indexOf(myId);

      const currentPlayer = players[currentTurnIndex];
      document.getElementById("turnBox").innerText =
        myIndex === currentTurnIndex ? `🟢 Your Turn (${currentPlayer})` : `⏳ ${currentPlayer}'s Turn`;

      document.getElementById("endTurnBtn").disabled = (myIndex !== currentTurnIndex);
    });

    generateCountries();
    renderMap();
  </script>
</body>
</html>
