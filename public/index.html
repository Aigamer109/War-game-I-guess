<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grand Strategy War Game</title>
<style>
  body { margin: 0; font-family: sans-serif; background: #87CEEB; }
  #lobby, #game { display: none; }
  #lobby { padding: 20px; }
  #game { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
  #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .country { position: absolute; cursor: pointer; border: 1px solid #333; text-align: center; color: #fff; font-size: 12px; }
  #turnIndicator { position: absolute; top: 0; left: 0; width: 100%; background: #ccc; padding: 5px; text-align: center; z-index: 1000; }
  #unitMenu { position: absolute; top: 50px; right: 10px; width: 200px; background: rgba(200,200,200,0.9); padding: 10px; display: none; }
  .unitTab { cursor: pointer; display: inline-block; margin: 0 2px; padding: 2px 5px; background: #aaa; }
  .unitTab.active { background: #888; }
  .unitList { margin-top: 5px; }
</style>
</head>
<body>

<div id="lobby">
  <h2>Lobby</h2>
  <label>Name: <input id="playerName" type="text" placeholder="Player1"></label>
  <button id="hostBtn">Host Lobby</button>
  <button id="joinBtn">Join Lobby</button>
  <div id="lobbyPlayers"></div>
  <button id="startBtn" disabled>Start Game</button>
</div>

<div id="game">
  <div id="turnIndicator">Current Turn: </div>
  <canvas id="map"></canvas>
  <div id="unitMenu">
    <div>
      <span class="unitTab active" data-type="ground">Ground</span>
      <span class="unitTab" data-type="air">Air</span>
      <span class="unitTab" data-type="sea">Sea</span>
    </div>
    <div class="unitList"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// Lobby elements
const lobbyDiv = document.getElementById('lobby');
const gameDiv = document.getElementById('game');
const hostBtn = document.getElementById('hostBtn');
const joinBtn = document.getElementById('joinBtn');
const startBtn = document.getElementById('startBtn');
const playerNameInput = document.getElementById('playerName');
const lobbyPlayersDiv = document.getElementById('lobbyPlayers');
const turnIndicator = document.getElementById('turnIndicator');

let playerName = '';
let playerId = '';
let players = [];
let mapData = [];
let currentPlayerIndex = 0;
let selectedCountry = null;
let unitMenuVisible = false;

// Lobby actions
hostBtn.onclick = () => {
  playerName = playerNameInput.value || 'Player1';
  socket.emit('hostLobby', playerName);
};

joinBtn.onclick = () => {
  playerName = playerNameInput.value || 'PlayerX';
  socket.emit('joinLobby', playerName);
};

startBtn.onclick = () => socket.emit('startGame');

socket.on('lobbyUpdate', (data) => {
  players = data.players;
  lobbyPlayersDiv.innerHTML = players.map(p => 
    `${p.name}${p.host ? ' [Host]' : ''}${p.bot ? ' [Bot]' : ''}`
  ).join('<br>');
  startBtn.disabled = !(players.length >= 2 && players.find(p => p.host && !p.bot));
});

socket.on('gameStart', (data) => {
  lobbyDiv.style.display = 'none';
  gameDiv.style.display = 'block';
  mapData = data.map;
  currentPlayerIndex = data.currentPlayerIndex;
  renderMap();
  updateTurnIndicator();
});

// Map rendering
const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function renderMap() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  mapData.forEach(c => {
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.moveTo(c.polygon[0].x, c.polygon[0].y);
    for(let i=1;i<c.polygon.length;i++) ctx.lineTo(c.polygon[i].x,c.polygon[i].y);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.fillText(c.name, c.center.x-ctx.measureText(c.name).width/2, c.center.y);
  });
}

canvas.onclick = (e) => {
  const mx = e.clientX;
  const my = e.clientY;
  selectedCountry = mapData.find(c => isPointInPolygon({x:mx,y:my}, c.polygon));
  if(selectedCountry) {
    showUnitMenu(selectedCountry);
  } else hideUnitMenu();
};

function isPointInPolygon(point, vs) {
  let x = point.x, y = point.y;
  let inside = false;
  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
    let xi = vs[i].x, yi = vs[i].y;
    let xj = vs[j].x, yj = vs[j].y;
    let intersect = ((yi > y) != (yj > y)) && 
                    (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
    if(intersect) inside = !inside;
  }
  return inside;
}

// Unit menu
const unitMenuDiv = document.getElementById('unitMenu');
const tabs = document.querySelectorAll('.unitTab');
const unitListDiv = unitMenuDiv.querySelector('.unitList');

tabs.forEach(t => t.onclick = () => {
  tabs.forEach(tab => tab.classList.remove('active'));
  t.classList.add('active');
  renderUnits(selectedCountry, t.dataset.type);
});

function showUnitMenu(country) {
  unitMenuDiv.style.display = 'block';
  renderUnits(country, 'ground');
}

function hideUnitMenu() {
  unitMenuDiv.style.display = 'none';
}

function renderUnits(country, type) {
  if(!country) return;
  unitListDiv.innerHTML = '';
  const units = country.units[type];
  units.forEach((u,i) => {
    const btn = document.createElement('button');
    btn.textContent = `${u.name} (${u.count})`;
    btn.onclick = () => selectUnit(country, type, i);
    unitListDiv.appendChild(btn);
  });
}

function selectUnit(country,type,index){
  socket.emit('selectUnit', {countryId: country.id, type, index});
}

// Turn indicator
function updateTurnIndicator() {
  const current = players[currentPlayerIndex];
  turnIndicator.textContent = `Current Turn: ${current.name}${current.bot ? ' [Bot]' : ''}`;
}

socket.on('turnUpdate', (index) => {
  currentPlayerIndex = index;
  updateTurnIndicator();
});

</script>
</body>
</html>
