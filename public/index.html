<!DOCTYPE html>
<html>
<head>
  <title>World Strategy Game</title>
</head>
<body>
  <h1>World Strategy Lobby</h1>

  <button onclick="createRoom()">Create Room</button>
  <br><br>

  <input id="roomInput" placeholder="Enter Room Code" />
  <button onclick="joinRoom()">Join Room</button>

  <h2 id="status"></h2>
  <h3 id="players">Players: </h3>
  <h3 id="turnInfo"></h3>

  <button id="endTurnBtn" onclick="endTurn()">End Turn</button>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let currentRoom = null;
    let myId = null;

    socket.on("myId", (id) => { myId = id; });

    function createRoom() {
      socket.emit("createRoom");
    }

    function joinRoom() {
      const code = document.getElementById("roomInput").value.toUpperCase();
      socket.emit("joinRoom", code);
      currentRoom = code;
    }

    function endTurn() {
      if (currentRoom) {
        socket.emit("endTurn", currentRoom);
      }
    }

    // Room created
    socket.on("roomCreated", (code) => {
      currentRoom = code;
      document.getElementById("status").innerText = "Room Code: " + code;
    });

    // Update player list
    socket.on("updatePlayers", (players) => {
      let list = players.map((p,i) => {
        let name = "Player " + (i+1);
        return (p===myId ? name + " (You)" : name);
      });
      document.getElementById("players").innerText = "Players: " + list.join(", ");
    });

    // Turn update
    socket.on("turnUpdate", (data) => {
      const { turnIndex, players } = data;
      const turnSocketId = players[turnIndex];
      let turnName = "Player " + (turnIndex + 1);

      if (turnSocketId === myId) {
        document.getElementById("turnInfo").innerText = `🟢 Your turn!`;
        document.getElementById("endTurnBtn").disabled = false;
      } else {
        document.getElementById("turnInfo").innerText = `⏳ ${turnName}'s turn`;
        document.getElementById("endTurnBtn").disabled = true;
      }

      let list = players.map((p,i) => {
        let name = "Player " + (i+1);
        return (p===myId ? name + " (You)" : name);
      });
      document.getElementById("players").innerText = "Players: " + list.join(", ");
    });

    socket.on("worldPeaceVote", () => {
      alert("World Peace Vote Triggered!");
    });

    socket.on("errorMessage", (msg) => {
      alert(msg);
    });
  </script>
</body>
</html>
