<!DOCTYPE html>
<html>
<head>
  <title>World Strategy Game</title>
  <style>
    body { margin:0; font-family: sans-serif; background:#87ceeb; }
    #menu, #game { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    #game { display:none; }
    #players { margin-bottom:10px; }
    #turnBox { background: #ccc; padding:10px; font-weight:bold; margin-bottom:5px; }
    #mapCanvas { border:1px solid #333; background:#4db8ff; }
    .countryStats { position:absolute; background:#eee; padding:5px; border:1px solid #333; display:none; z-index:1000; }
    button { margin:5px; padding:10px; }
  </style>
</head>
<body>
  <div id="menu">
    <h1>World Strategy Game</h1>
    <button id="hostBtn">Host Lobby</button>
    <input id="joinInput" placeholder="Enter Room Code">
    <button id="joinBtn">Join Lobby</button>
    <div id="status"></div>
  </div>

  <div id="game">
    <div id="players"></div>
    <div id="turnBox">Waiting...</div>
    <canvas id="mapCanvas" width="900" height="600"></canvas>
    <button id="endTurnBtn">End Turn</button>
  </div>

  <div id="statsPopup" class="countryStats"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let currentRoom = null;
    let players = [];
    let turnIndex = 0;
    let myId = null;

    // Map
    const canvas = document.getElementById("mapCanvas");
    const ctx = canvas.getContext("2d");
    let countries = [];

    function randomColor() { return `hsl(${Math.random()*360},50%,60%)`; }
    function randomInt(min,max){ return Math.floor(Math.random()*(max-min+1)+min); }

    function generateCountries() {
      countries = [];
      const names = ["Argentina","Brazil","Canada","Chile","France","Germany","Italy","Japan","Mexico","Norway",
                     "Spain","Sweden","UK","USA","Russia","China","India","Egypt","Nigeria","SouthAfrica",
                     "SaudiArabia","Turkey","Thailand","Vietnam","Indonesia","Philippines","Pakistan","Ukraine",
                     "Poland","Greece","Portugal","Netherlands","Belgium","Czechia","Hungary","Romania","Finland",
                     "Iceland","NewZealand","Australia","Colombia","Peru","Venezuela","Ethiopia","Kenya","Morocco",
                     "Algeria","Libya","Sudan","Syria","Iran"];
      for(let i=0;i<50;i++){
        const poly = [];
        const cx = randomInt(50,850);
        const cy = randomInt(50,550);
        const verts = randomInt(5,8);
        for(let j=0;j<verts;j++){
          const angle = (j/verts)*2*Math.PI;
          const r = randomInt(20,50);
          poly.push({x:cx+r*Math.cos(angle), y:cy+r*Math.sin(angle)});
        }
        countries.push({
          name: names[i]||`Country${i}`,
          polygon: poly,
          color: randomColor(),
          owner: null,
          stats: {
            air: randomInt(10,100),
            naval: randomInt(0,100),
            ground: randomInt(10,100),
            resources: randomInt(50,200)
          }
        });
        // Landlocked adjustment (simplified)
        if(cx<150 || cx>750) countries[i].stats.naval = 0;
      }
    }

    function drawMap() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      countries.forEach(c=>{
        ctx.fillStyle = c.color;
        ctx.beginPath();
        c.polygon.forEach((p,i)=> { if(i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); });
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle="#333";
        ctx.stroke();
      });
    }

    canvas.addEventListener("click", e=>{
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX-rect.left;
      const my = e.clientY-rect.top;
      countries.forEach(c=>{
        ctx.beginPath();
        c.polygon.forEach((p,i)=> { if(i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); });
        ctx.closePath();
        if(ctx.isPointInPath(mx,my)){
          const stats = c.stats;
          const popup = document.getElementById("statsPopup");
          popup.style.left = (mx+10)+"px";
          popup.style.top = (my+10)+"px";
          popup.innerHTML = `<b>${c.name}</b><br>Air: ${stats.air}<br>Naval: ${stats.naval}<br>Ground: ${stats.ground}<br>Resources: ${stats.resources}`;
          popup.style.display="block";

          // Capture example (only for active player)
          if(players[turnIndex] && !players[turnIndex].id.startsWith("bot_")){
            c.owner = players[turnIndex].country;
            c.color = turnIndex==0 ? "#ff0000" : turnIndex==1 ? "#00ff00" : turnIndex==2 ? "#0000ff" : "#ffff00";
            drawMap();
          }
        }
      });
    });

    // Hide popup when clicking outside
    canvas.addEventListener("mousemove", e=>{
      const popup = document.getElementById("statsPopup");
      popup.style.display="none";
    });

    document.getElementById("hostBtn").onclick = ()=>{
      socket.emit("createRoom");
    };
    document.getElementById("joinBtn").onclick = ()=>{
      const code = document.getElementById("joinInput").value;
      socket.emit("joinRoom", code);
      currentRoom = code;
    };

    document.getElementById("endTurnBtn").onclick = ()=>{
      if(currentRoom) socket.emit("endTurn", currentRoom);
    };

    socket.on("roomCreated",(code)=>{
      currentRoom = code;
      myId = socket.id;
      document.getElementById("status").innerText = "Room Code: "+code+" (Host)";
    });

    socket.on("updatePlayers",(p)=>{
      players = p;
      const playersDiv = document.getElementById("players");
      playersDiv.innerHTML="";
      p.forEach(pl=>{
        playersDiv.innerHTML += `<div>${pl.name} ${pl.country?`(${pl.country})`:''}</div>`;
      });
    });

    socket.on("gameStarted",(p)=>{
      players = p;
      document.getElementById("menu").style.display="none";
      document.getElementById("game").style.display="flex";
      generateCountries();
      drawMap();
      updateTurnBox();
    });

    socket.on("turnUpdate",(index,ps)=>{
      turnIndex = index;
      players = ps;
      updateTurnBox();
    });

    function updateTurnBox(){
      const tb = document.getElementById("turnBox");
      const p = players[turnIndex];
      tb.innerText = p ? `${p.name}'s Turn (${p.country})` : "Waiting...";
    }
  </script>
</body>
</html>
