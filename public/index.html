<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War Game</title>
<style>
  body { margin: 0; font-family: Arial, sans-serif; background: #001f3f; color: white; }
  #lobby, #game { display: none; }
  #top-bar { background: #ccc; color: black; padding: 10px; text-align: center; font-weight: bold; }
  canvas { background: #0074D9; display: block; margin: 0 auto; }
  .player-list { margin-top: 10px; }
  .player { margin-bottom: 5px; }
  #country-stats { position: absolute; background: rgba(0,0,0,0.7); color: white; padding: 5px; display: none; border-radius: 5px; font-size: 14px; }
  button { margin: 5px; }
</style>
</head>
<body>
<div id="menu">
  <h1>War Game</h1>
  <input id="playerName" placeholder="Enter Your Name">
  <button id="hostBtn">Host Lobby</button>
  <input id="lobbyCodeInput" placeholder="Lobby Code">
  <button id="joinBtn">Join Lobby</button>
</div>

<div id="lobby">
  <h2>Lobby <span id="hostLabel"></span></h2>
  <div class="player-list" id="players"></div>
  <button id="startBtn" disabled>Start Game</button>
</div>

<div id="game">
  <div id="top-bar">Current Turn: </div>
  <canvas id="mapCanvas" width="1200" height="700"></canvas>
  <div id="country-stats"></div>
  <button id="endTurnBtn">End Turn</button>
</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
const socket = io();
let playerName = '';
let lobbyCode = '';
let playerIndex = null;
let countries = [];
let currentPlayer = null;
let units = [];

// --- Lobby ---
document.getElementById('hostBtn').onclick = () => {
  playerName = document.getElementById('playerName').value || 'Player';
  socket.emit('hostLobby', playerName);
};

document.getElementById('joinBtn').onclick = () => {
  playerName = document.getElementById('playerName').value || 'Player';
  lobbyCode = document.getElementById('lobbyCodeInput').value;
  if(lobbyCode) socket.emit('joinLobby', { name: playerName, code: lobbyCode });
};

socket.on('lobbyCreated', code => {
  lobbyCode = code;
  document.getElementById('menu').style.display = 'none';
  document.getElementById('lobby').style.display = 'block';
  document.getElementById('hostLabel').innerText = ' (Host)';
});

socket.on('lobbyJoined', data => {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('lobby').style.display = 'block';
  document.getElementById('hostLabel').innerText = data.isHost ? ' (Host)' : '';
  updatePlayers(data.players);
  document.getElementById('startBtn').disabled = !data.isHost || data.players.length < 2;
});

socket.on('updatePlayers', updatePlayers);
function updatePlayers(players){
  const container = document.getElementById('players');
  container.innerHTML = '';
  players.forEach(p => {
    const div = document.createElement('div');
    div.innerText = p.name + (p.isHost ? ' (Host)' : '') + (p.isBot ? ' [Bot]' : '');
    container.appendChild(div);
  });
  document.getElementById('startBtn').disabled = !players.some(p=>p.isHost) || players.length < 2;
}

document.getElementById('startBtn').onclick = () => {
  socket.emit('startGame', lobbyCode);
};

// --- Game ---
socket.on('startGameClient', data => {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  countries = data.countries;
  playerIndex = data.playerIndex;
  currentPlayer = data.currentPlayer;
  drawMap();
  updateTopBar();
});

// --- Map & Stats ---
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
const statsDiv = document.getElementById('country-stats');

canvas.onclick = e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  for(const c of countries){
    if(pointInPolygon([x,y], c.polygon)){
      showCountryStats(c, x, y);
      break;
    }
  }
};

function showCountryStats(country, x, y){
  statsDiv.style.left = x + 'px';
  statsDiv.style.top = y + 'px';
  statsDiv.innerHTML = `<b>${country.name}</b><br>Owner: ${country.owner}<br>`+
                        `Air: ${country.air} <br>Naval: ${country.naval} <br>`+
                        `Ground: ${country.ground} <br>Resources: ${country.resources}`;
  statsDiv.style.display = 'block';
}

function pointInPolygon(point, vs) {
  let x = point[0], y = point[1];
  let inside = false;
  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
      let xi = vs[i][0], yi = vs[i][1];
      let xj = vs[j][0], yj = vs[j][1];
      let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
      if (intersect) inside = !inside;
  }
  return inside;
}

function drawMap(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const c of countries){
    ctx.fillStyle = c.color;
    ctx.beginPath();
    c.polygon.forEach((p,i)=> i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]));
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'black';
    ctx.stroke();
    ctx.fillStyle = 'white';
    ctx.fillText(c.name, c.center[0]-10, c.center[1]);
  }
}

// --- Turn system ---
function updateTopBar(){
  document.getElementById('top-bar').innerText = `Current Turn: ${currentPlayer.name}`;
}

document.getElementById('endTurnBtn').onclick = () => {
  socket.emit('endTurn', { lobbyCode });
};

socket.on('updateTurn', data => {
  currentPlayer = data.currentPlayer;
  drawMap();
  updateTopBar();
});

// --- Units & movement placeholder ---
// Ships, tanks, planes, etc., will move on map based on turns.
// We'll animate them later with positions updated from server.

</script>
</body>
</html>
